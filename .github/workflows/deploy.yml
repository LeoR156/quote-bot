name: Quote Bot CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  formatting-check:
    name: Formatting Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: run YAPF to test if python code is correctly formatted
        uses: AlexanderMelde/yapf-action@v2.0
        with:
          args: --verbose

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run OWASP Noir
        id: noir
        uses: owasp-noir/noir@v1.1.0
        with:
          base_path: '.'
      - name: Display results
        run: echo '${{ steps.noir.outputs.endpoints }}' | jq .

  build-and-push:
    name: Build and push to Docker Hub
    needs: [security-scan, formatting-check]
    runs-on: ubuntu-latest
    steps:
      - name: Скачиваем код бота
        uses: actions/checkout@v4

      - name: Логинимся в Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Сборка и пуш Docker образа
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: leor156/quote-bot:latest

  deploy:
    name: Deploy to VPS via SSH
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Подключение по SSH и обновление контейнера
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Подтягиваем свежий образ
            docker pull leor156/quote-bot:latest

            # Останавливаем и удаляем старый контейнер
            docker stop quote-bot || true
            docker rm quote-bot || true

            # Запускаем новый контейнер
            docker run -d \
              --name quote-bot \
              --restart unless-stopped \
              -e TOKEN="${{ secrets.TOKEN }}" \
              -e ADMIN_IDS="${{ secrets.ADMIN_IDS }}" \
              -v /opt/quote-bot/data:/app/data \
              leor156/quote-bot:latest

            # Очищаем неиспользуемые образы, чтобы не забивать диск сервера
            docker image prune -f
